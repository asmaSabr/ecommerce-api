spring.application.name=api
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.liquibase.enabled=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 1. Empõche Spring de rediriger vers sa page /error par dÕfaut
server.error.whitelabel.enabled=false
# Force Spring Á lever une exception si l'URL n'existe pas
spring.mvc.throw-exception-if-no-handler-found=true
# DÕsactive la recherche de ressources statiques pour Õviter les conflits
spring.web.resources.add-mappings=false


# Compression des rÕponses GET
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/csv
server.compression.min-response-size=1024

